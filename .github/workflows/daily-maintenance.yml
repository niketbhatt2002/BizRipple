name: Daily Cross-Repo Maintenance

on:
  schedule:
    # 04:30 UTC daily
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runner repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub pyyaml requests

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MAINT_BOT_APP_ID }}
          private-key: ${{ secrets.MAINT_BOT_PRIVATE_KEY }}
          owner: niketbhatt2002

      - name: Run maintenance bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_OWNER: niketbhatt2002
        run: |
          python scripts/daily_maintenance_bot.py
